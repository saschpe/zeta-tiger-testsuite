stages:
  - preflight
  - lint
  - codex
  - test
  - traceability
  - docs
  - pages
  - container

utf8_posix_check:
  stage: preflight
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    # git is needed for `git ls-files`
    # libintl provides the `iconv` binary on Alpine
    - apk add --no-cache git libintl
  script:
    - |
      bad=0

      # NOTE: assumes "standard" filenames (no spaces/newlines) are fine
      for f in $(git ls-files); do
        case "$f" in
          tools/*) continue ;;
        esac

        # skip files that look binary (contain NUL)
        if LC_ALL=C grep -q "$(printf '\0')" "$f" 2>/dev/null; then
          continue
        fi

        # check for CR (Windows CRLF endings)
        if LC_ALL=C grep -q "$(printf '\r')" "$f" 2>/dev/null; then
          echo "CRLF: $f"
          bad=1
        fi

        # check UTF-8 validity
        if ! iconv -f UTF-8 -t UTF-8 "$f" >/dev/null 2>&1; then
          echo "Non-UTF8: $f"
          bad=1
        fi
      done

      exit $bad


lint:
  stage: lint
  image: maven:3.9.11-eclipse-temurin-21-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -Xmx512m"
    MAVEN_CLI_OPTS: "-B -ntp -nsu -DskipTests=true -Djava.awt.headless=true -Dtraceability.skip=true -Dtraceability.sync.skip=true -Dserenity.readme.sync.skip=true"
  script:
    # 'check' fails the job on violations; 'checkstyle' only generates reports
    - mvn $MAVEN_CLI_OPTS checkstyle:check --fail-at-end
  artifacts:
    when: always
    paths:
      - target/checkstyle-result.xml
  cache:
    key:
      files:
        - pom.xml
    paths:
      - .m2/repository
    policy: pull-push
  allow_failure: false

codex_review:
  stage: codex
  image: node:24
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CODEX_AUTH_JSON
      when: on_success
    - when: never
  variables:
    CODEX_QA_PATH: "gl-code-quality-report.json"
    CODEX_RAW_LOG: "artifacts/codex-raw.log"
    # Strict prompt: must output a single JSON array (or []), no prose/markdown/placeholders.
    CODEX_PROMPT: |
      Review the allowlisted files and output a GitLab Code Quality report in CodeClimate JSON format.
      This repository is a test suite with German Gherkin feature files (#language:de), Asciidoc docs, and YAML configs.
      Focus only on concrete, high-signal problems that would likely break execution, traceability, or docs.
      Ignore formatting, whitespace, and subjective naming/style nits.
      RULES (must follow exactly):
      - OUTPUT MUST BE A SINGLE JSON ARRAY. Example: [] or [ {...}, {...} ].
      - If you find no issues, OUTPUT EXACTLY: []
      - DO NOT print any prose, backticks, code fences, markdown, or placeholders.
      - DO NOT write any files. PRINT ONLY between these two lines:
        === BEGIN_CODE_QUALITY_JSON ===
        <JSON ARRAY HERE>
        === END_CODE_QUALITY_JSON ===
      Each issue object MUST include these fields:
        "description": String,
        "check_name": String (short rule name),
        "fingerprint": String (stable across runs for same issue),
        "severity": "info"|"minor"|"major"|"critical"|"blocker",
        "location": { "path": "<repo-relative-file>", "lines": { "begin": <line> } }
      Requirements:
      - Use repo-relative paths from the current checkout (no "./", no absolute paths).
      - Use only files that actually exist in this repo.
      - No trailing commas. No comments. No BOM.
      - Prefer concrete, de-duplicated findings. If uncertain, omit the finding.
  script:
    - set -euo pipefail
    - echo "PWD=$(pwd)  CI_PROJECT_DIR=${CI_PROJECT_DIR}"
    - mkdir -p artifacts
    - ': > ${CODEX_RAW_LOG}'
    - ': > ${CODEX_QA_PATH}'
    - |
      mkdir -p "${HOME}/.codex"
      if [ -z "${CODEX_AUTH_JSON:-}" ]; then
        echo "CODEX_AUTH_JSON missing; writing empty report and exiting."
        echo "[]" > "${CODEX_QA_PATH}"
        exit 0
      fi
      if [ -f "${CODEX_AUTH_JSON}" ]; then
        cp "${CODEX_AUTH_JSON}" "${HOME}/.codex/auth.json"
      else
        printf '%s' "${CODEX_AUTH_JSON}" > "${HOME}/.codex/auth.json"
      fi
      echo "Using CODEX_AUTH_JSON for Codex auth."
    - apt-get update && apt-get install -y --no-install-recommends ca-certificates curl git
    - npm -g i @openai/codex@latest
    - codex login status
    - codex --version && git --version
    - |
      DIFF_BASE=""
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-}" ]; then
        DIFF_BASE="${CI_MERGE_REQUEST_DIFF_BASE_SHA}"
      elif [ -n "${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-}" ]; then
        DIFF_BASE="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA}"
      fi
      if [ -n "${DIFF_BASE}" ]; then
        FILE_LIST="$(git diff --name-only --diff-filter=ACMRT "${DIFF_BASE}" "${CI_COMMIT_SHA}" | sed 's/^/- /')"
      else
        FILE_LIST="$(git ls-files | sed 's/^/- /')"
      fi
      if [ -z "${FILE_LIST}" ]; then
        FILE_LIST="$(git ls-files | sed 's/^/- /')"
      fi
      export CODEX_PROMPT="${CODEX_PROMPT}
      Only report issues in the following existing files (exactly as listed):
      ${FILE_LIST}"
    - |
      set +o pipefail
      codex exec --sandbox danger-full-access -c approval_policy=never "$CODEX_PROMPT" | tee "${CODEX_RAW_LOG}" >/dev/null
      CODEX_RC=${PIPESTATUS[0]}
      set -o pipefail
      echo "Codex exit code: ${CODEX_RC}"
    - |
      if grep -Eqi "quota exceeded|insufficient_quota" "${CODEX_RAW_LOG}"; then
        echo "Codex quota exceeded; writing empty report and exiting."
        echo "[]" > "${CODEX_QA_PATH}"
        exit 0
      fi
    - |
      TMP_OUT="$(mktemp)"
      sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' "${CODEX_RAW_LOG}" \
        | tr -d '\r' \
        | awk '
            /^\s*=== BEGIN_CODE_QUALITY_JSON ===\s*$/ {grab=1; next}
            /^\s*=== END_CODE_QUALITY_JSON ===\s*$/   {grab=0}
            grab
          ' > "${TMP_OUT}"
      if ! node -e 'const f=process.argv[1]; const s=require("fs").readFileSync(f,"utf8").trim(); if(!s || /(<JSON ARRAY HERE>|BEGIN_CODE_QUALITY_JSON|END_CODE_QUALITY_JSON)/.test(s)) process.exit(2); JSON.parse(s);' "${TMP_OUT}"; then
        echo "WARNING: Extracted content empty/invalid; writing empty [] report."
        echo "[]" > "${TMP_OUT}"
      fi
      mv -f "${TMP_OUT}" "${CODEX_QA_PATH}"
      if [ "${CODEX_RC}" -ne 0 ]; then
        echo "WARNING: Codex exited with code ${CODEX_RC}. Proceeding with extracted report." >&2
      fi
  artifacts:
    when: always
    reports:
      codequality: gl-code-quality-report.json
    paths:
      - artifacts/codex-raw.log
    expire_in: 14 days
  allow_failure: true

test:
  stage: test
  image: maven:3.9.11-eclipse-temurin-21-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    # JVM options for Maven itself
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
    # Common Maven CLI flags (quiet logs, faster, headless, no snapshot checks)
    MAVEN_CLI_OPTS: "-B -q -ntp -nsu -T 1C -Djava.awt.headless=true -Dtraceability.skip=true -Dtraceability.sync.skip=true -Dserenity.readme.sync.skip=true"
    # Put Tiger toggles in one place so scripts stay readable
    TIGER_FLAGS: >
      -Dtiger.lib.activateWorkflowUi=false
      -Dtiger.lib.startBrowser=false
      -Dtiger.lib.trafficVisualization=false
      -Dtiger.lib.runTestsOnStart=true
      -Dtiger.lib.rbelAnsiColors=false
      -Dzeta_base_url=zeta-staging.spree.de
      -Dzeta_proxy=no-proxy
  script:
    - |
      mvn $MAVEN_CLI_OPTS \
        "-Dcucumber.filter.tags=not @perf" \
        $TIGER_FLAGS verify
  artifacts:
    when: always
    reports:
      junit: target/failsafe-reports/TEST-*.xml
    paths:
      # Keep only the Serenity assets required for traceability + Pages publishing.
      - target/site/serenity
    expire_in: 1 week
  cache:
    key:
      files:
        - pom.xml
    paths:
      - .m2/repository
    policy: pull-push
  allow_failure: true # Known failing scenarios still provide reports for downstream jobs.

traceability:
  stage: traceability
  image: ghcr.io/astral-sh/uv:bookworm-slim # Debian/glibc image with uv preinstalled so pydowndoc-bin wheels resolve
  variables:
    UV_LINK_MODE: "copy"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    # Download the Serenity report required for runtime coverage.
    - job: test
      artifacts: true
      optional: true # Continue even when the test job reports expected failures.
  script:
    - uv sync --project docs/scripts
    - uv run --project docs/scripts traceability build --project-root .
  artifacts:
    paths:
      # Provide all generated traceability sources to the docs job.
      - docs/asciidoc/diagrams
      - docs/asciidoc/tables
      - target/generated-docs/traceability.json
    expire_in: 1 week

docs:
  stage: docs
  image: uwebarthel/asciidoctor:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    # Pull in the traceability artefacts generated after the test run.
    - job: traceability
      artifacts: true
  script:
    - mkdir -p docs
    - |
      asciidoctor \
        -r asciidoctor-diagram \
        -a data-uri \
        -a puppeteer-config=docs/puppeteer-config.json \
        -D docs \
        docs/asciidoc/Testplan_ZETA.adoc
  artifacts:
    paths:
      - docs/Testplan_ZETA.html
    expire_in: 1 week
  allow_failure: true

pages:
  stage: pages
  image: busybox:stable
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    # Only download the Serenity report needed for publishing.
    - job: test
      artifacts: true
      optional: true # Publish even if tests failed (reports still generated).
  script:
    - echo "Publishing Serenity report"
  pages:
    publish: target/site/serenity
    expire_in: 1 week

docker-image:
  stage: container
  image: docker:29-cli
  services:
    - name: docker:29-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - |
      # Authenticate once with the GitLab container registry (stdin avoids leaking secrets).
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      # Build and push with Docker schema v2 manifest (config digest present) using the default Buildx builder.
      # Use the container driver because the default docker driver cannot build multi-arch images in DinD.
      docker buildx create --use --name multiarch-builder --driver docker-container
      # Ensure the builder is ready before we start the build.
      docker buildx inspect --bootstrap
      # - --pull keeps base layers current; --output oci-mediatypes=false flips media type from OCI to Docker v2; --platform linux/amd64,linux/arm64 for platform independence
      docker buildx build \
        --pull \
        --output=type=registry,oci-mediatypes=false \
        --platform linux/amd64,linux/arm64 \
        -f docker/frontend/Dockerfile \
        -t "${CI_REGISTRY_IMAGE}:latest" \
        .

docker-image-qualitygate:
  stage: container
  image: docker:29-cli
  services:
    - name: docker:29-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker buildx create --use --name multiarch-builder-qg --driver docker-container
    - docker buildx inspect --bootstrap
    - |
      docker buildx build \
        --pull \
        --output=type=registry,oci-mediatypes=false \
        --platform linux/amd64,linux/arm64 \
        -f docker/quality_gate/Dockerfile \
        -t "${CI_REGISTRY_IMAGE}:qualitygate" \
        .
